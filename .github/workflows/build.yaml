name: Build and Push

on:
  push:
    branches: [main]
    tags: ["*"]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.tags.outputs.tags }}
      version: ${{ steps.version.outputs.caddy_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Caddy version from Dockerfile
        id: version
        run: |
          VERSION=$(grep -oP 'FROM caddy:\K[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | head -1)
          echo "caddy_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Determine tags
        id: tags
        run: |
          IMAGE="miget/miget-caddy"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tags=${IMAGE}:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${{ steps.version.outputs.caddy_version }}"
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=miget/miget-caddy,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.slug.outputs.slug }}
          cache-to: type=gha,scope=${{ steps.slug.outputs.slug }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          retention-days: 1

  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        run: |
          IFS=',' read -ra TAGS <<< "${{ needs.prepare.outputs.tags }}"
          TAG_ARGS=()
          for tag in "${TAGS[@]}"; do
            TAG_ARGS+=(-t "$tag")
          done
          docker buildx imagetools create "${TAG_ARGS[@]}" \
            $(printf 'miget/miget-caddy@sha256:%s ' *)
        working-directory: /tmp/digests
